<!DOCTYPE html>

  <title>Grid Responsivo</title>
 <link rel="stylesheet" href="global.css"/>
</head>
<body>

    </div>
 
    <div class="cell cell-c">
      <img src="parasaurio.jpeg" alt="C"/>

    </div>
 
    <div class="cell cell-d">
      <img src="sapo.jpeg" alt="D"/>

    </div>
 
  </div>
 
</body>
</html>
